name: Bump Version

# Only trigger on explicit release creation — NOT on every push.
# This prevents the version inflation problem where every commit
# (including bot commits) would increment the patch version.
on:
  release:
    types: [published]

jobs:
  bump-version:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Extract version from release tag
        run: |
          TAG="${{ github.event.release.tag_name }}"
          # Strip leading 'v' if present (v3.4.9 -> 3.4.9)
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        id: version

      - name: Sync version.py
        run: |
          cat > mnemion/version.py << EOF
          """Single source of truth for the Mnemion package version."""

          __version__ = "${{ steps.version.outputs.version }}"
          EOF
          # Remove leading whitespace from heredoc
          sed -i 's/^          //' mnemion/version.py

      - name: Sync plugin.json
        run: |
          jq --arg v "${{ steps.version.outputs.version }}" '.version = $v' .claude-plugin/plugin.json > tmp.json && mv tmp.json .claude-plugin/plugin.json

      - name: Sync marketplace.json
        run: |
          jq --arg v "${{ steps.version.outputs.version }}" '.plugins[0].version = $v' .claude-plugin/marketplace.json > tmp.json && mv tmp.json .claude-plugin/marketplace.json

      - name: Sync codex plugin.json
        run: |
          jq --arg v "${{ steps.version.outputs.version }}" '.version = $v' .codex-plugin/plugin.json > tmp.json && mv tmp.json .codex-plugin/plugin.json

      - name: Sync pyproject.toml
        run: |
          sed -i "s/^version = \".*\"/version = \"${{ steps.version.outputs.version }}\"/" pyproject.toml

      - name: Sync molthub project.md
        run: |
          sed -i "s/^version: \".*\"/version: \"${{ steps.version.outputs.version }}\"/" .molthub/project.md

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mnemion/version.py .claude-plugin/plugin.json .claude-plugin/marketplace.json .codex-plugin/plugin.json pyproject.toml .molthub/project.md
          if ! git diff --staged --quiet; then
            git commit -m "chore: sync all manifests to ${{ steps.version.outputs.version }} [skip ci]"
            git push
          fi
