name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install uv
      - run: uv lock --check
      - run: uv sync --python ${{ matrix.python-version }} --group dev
      - run: uv run python -m pytest tests/ -v --ignore=tests/benchmarks --cov=mnemion --cov-report=term-missing --cov-fail-under=30

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: python -m pip install uv
      - run: uv lock --check
      - run: uvx ruff check .
      - run: uvx ruff format --check .
      - run: git ls-files '*.sh' | xargs -r bash -n

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: studio/frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: studio/frontend/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm audit --audit-level=high

  electron:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: studio/electron
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: studio/electron/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm audit --audit-level=high
